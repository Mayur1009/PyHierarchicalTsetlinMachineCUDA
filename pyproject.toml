[tool.ruff.format]
indent-style = "tab"
quote-style = "single"

[tool.pixi.workspace]
channels = ["conda-forge"]
platforms = ["linux-64"]

[tool.pixi.system-requirements]
cuda = "12"

[tool.pixi.dependencies]
python = "<3.14"
cuda = ">=12.0,<13.0"
networkx = ">=3.6.1"
ipdb = ">=0.13.13"
jupyterlab = ">=4.5.6"
pytest = ">=9.0.2"
pygraphviz = ">=1.14"
matplotlib = ">=3.9.1"

[tool.pixi.pypi-dependencies]
PyHierarchicalTsetlinMachineCUDA = { path = ".", editable = true, extras = ["examples"] }

